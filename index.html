<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cube Hop Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="hud" aria-label="Game status">
        <div>
          <p class="eyebrow">Prototype</p>
          <h1>Cube Hop</h1>
        </div>
        <div class="stats">
          <span>Level <strong id="levelText">1</strong></span>
          <span>Moves <strong id="moveCount">0</strong></span>
          <span>Stars <strong id="starRating">★★★</strong></span>
          <span>Tile <strong id="tilePosition">0, 0</strong></span>
          <span>Status <strong id="statusText">Find goal</strong></span>
        </div>
        <div class="top-actions">
          <div class="avatar-switch" aria-label="Choose player">
            <button class="avatar-button is-active" data-avatar="cube" type="button" aria-label="Cube" title="Cube">
              <span aria-hidden="true">■</span>
            </button>
            <button class="avatar-button" data-avatar="noor" type="button" aria-label="Noor" title="Noor">
              <span aria-hidden="true">●</span>
            </button>
          </div>
          <button class="camera-button" id="cameraButton" type="button" aria-label="Switch camera" title="Switch camera">
            <span aria-hidden="true">◉</span>
          </button>
          <button class="restart-button" id="restartButton" type="button" aria-label="Restart" title="Restart">
            <span aria-hidden="true">↻</span>
          </button>
          <button class="fullscreen-button" id="fullscreenButton" type="button" aria-label="Fullscreen" title="Fullscreen">
            <span aria-hidden="true">⛶</span>
          </button>
        </div>
      </section>

      <section class="viewport" aria-label="3D game viewport">
        <div id="game"></div>
        <div id="loading" class="loading">Loading 3D world...</div>
      </section>

      <section class="controls" aria-label="Controls">
        <button class="control-key" data-key="ArrowUp" aria-label="Move forward">↑</button>
        <div>
          <button class="control-key" data-key="ArrowLeft" aria-label="Move left">←</button>
          <button class="control-key" data-key="ArrowDown" aria-label="Move back">↓</button>
          <button class="control-key" data-key="ArrowRight" aria-label="Move right">→</button>
        </div>
      </section>

      <section class="win-overlay is-hidden" id="winOverlay" aria-live="polite">
        <div class="win-panel">
          <p id="winEyebrow">Level clear</p>
          <h2 id="winTitle">Stage clear!</h2>
          <span id="winDetail">Ready for the next level.</span>
          <div class="result-grid" aria-label="Level results">
            <span>Stars <strong id="resultStars">★★★</strong></span>
            <span>Moves <strong id="resultMoves">0</strong></span>
            <span>Time <strong id="resultTime">0.0s</strong></span>
            <span>Par <strong id="resultPar">0</strong></span>
          </div>
          <div class="win-actions">
            <button id="nextLevelButton" type="button">Next level</button>
            <button id="overlayRestartButton" type="button">Restart</button>
          </div>
        </div>
      </section>

      <section class="orientation-overlay" id="orientationOverlay" aria-live="polite">
        <div class="orientation-panel">
          <p>Rotate phone</p>
          <strong>Play in landscape</strong>
          <button id="orientationFullscreenButton" type="button">Fullscreen</button>
        </div>
      </section>
    </main>

    <script type="module" src="./game.js"></script>
  </body>
</html>
